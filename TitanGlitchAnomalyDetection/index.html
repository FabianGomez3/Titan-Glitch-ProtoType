<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan Glitch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #scene-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    #anomaly {
      position: absolute;
      left: 37%;
      top: 28%;
      width: 18%;
      height: 32%;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #anomaly img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: glitch 3s infinite;
    }

    #anomaly.show { opacity: 1; }

    @keyframes glitch {
      0%,100% { opacity: 1;   filter: brightness(1.3);                       transform: translate(0,0);     }
      5%       { opacity: 0.4; filter: brightness(2.5) hue-rotate(90deg);     transform: translate(-2px,1px);}
      6%       { opacity: 1;   filter: brightness(1.3);                       transform: translate(0,0);     }
      22%      { opacity: 1; }
      23%      { opacity: 0.6; filter: brightness(2) hue-rotate(180deg);      transform: translate(2px,-1px);}
      24%      { opacity: 1;   filter: brightness(1.3);                       transform: translate(0,0);     }
    }

    #mask {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9;
    }

    #hotspot {
      position: absolute;
      left: 32%;
      top: 22%;
      width: 24%;
      height: 42%;
      cursor: none;
      z-index: 20;
    }

    #popup {
      position: fixed;
      z-index: 100;
      background: rgba(10,10,10,0.95);
      border: 1px solid rgba(0,255,136,0.4);
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 18px 22px;
      display: none;
      flex-direction: column;
      gap: 14px;
      min-width: 240px;
      box-shadow: 0 0 30px rgba(0,255,136,0.15);
      transform: translate(-50%, -120%);
    }

    #popup.show { display: flex; }

    #popup p {
      line-height: 1.6;
      color: rgba(0,255,136,0.8);
      font-size: 12px;
    }

    .popup-btns {
      display: flex;
      gap: 10px;
    }

    .popup-btns button {
      flex: 1;
      background: transparent;
      border: 1px solid rgba(0,255,136,0.5);
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 7px 0;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .popup-btns button:hover {
      background: rgba(0,255,136,0.12);
      box-shadow: 0 0 10px rgba(0,255,136,0.3);
    }

    .popup-btns button.no {
      border-color: rgba(192,57,43,0.5);
      color: #e74c3c;
    }

    .popup-btns button.no:hover {
      background: rgba(192,57,43,0.1);
      box-shadow: 0 0 10px rgba(192,57,43,0.3);
    }

    #found-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      font-family: 'Courier New', monospace;
      color: #00ff88;
      text-align: center;
    }

    #found-overlay.show { display: flex; }

    #found-title {
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 6px;
      text-shadow: 0 0 20px #00ff88;
    }

    #found-sub {
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(0,255,136,0.55);
      line-height: 2;
    }

    #play-again {
      margin-top: 8px;
      background: transparent;
      border: 1px solid #00ff88;
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      padding: 9px 24px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    #play-again:hover {
      background: rgba(0,255,136,0.1);
      box-shadow: 0 0 14px #00ff88;
    }
  </style>
</head>

    <div id="hotspot"></div>
  </div>

  <div id="popup">
    <p>&#9888; ANOMALY DETECTED<br>Report this Anomaly?</p>
    <div class="popup-btns">
      <button onclick="reportYes()">Yes &#8212; Report</button>
      <button class="no" onclick="reportNo()">No &#8212; Keep Searching</button>
    </div>
  </div>

  <div id="found-overlay">
    <div id="found-title">ANOMALY REPORTED</div>
    <div id="found-sub">
      SUBJECT: CORRUPTED MASCOT DATA<br>
      TERMINAL 03 &#8212; ROW A<br><br>
      INCIDENT LOGGED.
    </div>
    <button id="play-again" onclick="resetGame()">[ Next Anomaly ]</button>
  </div>

  <script>
    const canvas       = document.getElementById('mask');
    const ctx          = canvas.getContext('2d');
    const popup        = document.getElementById('popup');
    const hotspot      = document.getElementById('hotspot');
    const anomaly      = document.getElementById('anomaly');
    const foundOverlay = document.getElementById('found-overlay');

    let mx = -999, my = -999;
    const RADIUS = 160;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    setTimeout(() => anomaly.classList.add('show'), 800);

    function drawMask() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const grad = ctx.createRadialGradient(mx, my, 0, mx, my, RADIUS);
      grad.addColorStop(0,   'rgba(0,0,0,1)');
      grad.addColorStop(0.6, 'rgba(0,0,0,0.7)');
      grad.addColorStop(1,   'rgba(0,0,0,0)');

      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(mx, my, RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }

    let raf;
    function loop() {
      drawMask();
      raf = requestAnimationFrame(loop);
    }
    loop();

    window.addEventListener('mousemove', (e) => {
      mx = e.clientX;
      my = e.clientY;
    });

    hotspot.addEventListener('click', (e) => {
      if (foundOverlay.classList.contains('show')) return;
      popup.style.left = e.clientX + 'px';
      popup.style.top  = e.clientY + 'px';
      popup.classList.add('show');
    });

    document.getElementById('scene').addEventListener('click', (e) => {
      if (e.target === hotspot) return;
      popup.classList.remove('show');
    });

    function reportYes() {
      popup.classList.remove('show');
      foundOverlay.classList.add('show');
      cancelAnimationFrame(raf);
      canvas.style.display = 'none';
      document.body.style.cursor = 'default';
    }

    function reportNo() {
      popup.classList.remove('show');
    }

    function resetGame() {
      foundOverlay.classList.remove('show');
      canvas.style.display = 'block';
      document.body.style.cursor = 'none';
      mx = -999;
      my = -999;
      loop();
    }
  </script>
